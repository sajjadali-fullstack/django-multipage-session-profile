<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>City | Page</title>

    <!-- Internal CSS -->
     <style>
        .asteriskField {
            display: none !important;
        }
     </style>

     <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center min-vh-screen py-5">

    <div class="container" style="max-width: 500px;">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4 p-md-5">
                
                <h2 class="card-title text-center fw-bold text-dark mb-4">City Registration</h2>
                <!-- Form  -->
                {% load crispy_forms_tags %}
                <form action="/result"> 
                     {% csrf_token %}
                    
                    <div class="mb-4">{{ form|crispy }}</div>
                    
                    <div class="d-grid">
                        <!-- Button -->
                        <button type="submit" class="btn btn-primary btn-lg rounded-3 fs-6 fw-medium shadow-sm">Submit Form</button>
                    </div>
                </form>

            </div>
        </div>
    </div>

</body>
</html>
